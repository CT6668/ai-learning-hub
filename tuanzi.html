<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🦘 跟着团子学 · AI学习路线</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0d1220;--card:#111827;--card2:#1a2236;
  --border:rgba(99,179,237,.1);--accent:#3b82f6;--accent2:#8b5cf6;
  --accent3:#06b6d4;--green:#10b981;--orange:#f59e0b;--red:#ef4444;
  --pink:#ec4899;--yellow:#fbbf24;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --radius:16px;--radius-sm:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Inter',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;background:rgba(7,9,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;background:linear-gradient(135deg,#f59e0b,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-logo-icon{flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-back{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text2);border:1px solid var(--border);transition:all .2s;cursor:pointer}
.nav-back:hover{color:var(--text);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05)}
.nav-user{display:flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2);font-size:13px;font-weight:600;color:#60a5fa;cursor:pointer}
.nav-user .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.nav-logout{font-size:12px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:8px;transition:all .2s}
.nav-logout:hover{color:var(--red);background:rgba(239,68,68,.1)}

/* ─── LOGIN SCREEN ─── */
#login-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(245,158,11,.12) 0%,rgba(139,92,246,.1) 40%,transparent 70%),var(--bg);padding:20px}
.login-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px;text-align:center;box-shadow:0 0 80px rgba(139,92,246,.15)}
.login-panda{font-size:72px;margin-bottom:16px;animation:pandabounce 2s ease-in-out infinite}
@keyframes pandabounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.login-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.login-sub{color:var(--text2);font-size:14px;margin-bottom:32px;line-height:1.7}
.login-form{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.login-input{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:15px;font-family:inherit;transition:all .2s;outline:none}
.login-input:focus{border-color:rgba(245,158,11,.5);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.login-input::placeholder{color:var(--text3)}
.login-btn{padding:14px;border-radius:12px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ec4899);color:white;border:none;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(245,158,11,.3)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,158,11,.45)}
.login-tip{font-size:12px;color:var(--text3)}
.login-switch{font-size:13px;color:var(--text2);margin-top:4px}
.login-switch span{color:#f59e0b;cursor:pointer;font-weight:600}
.login-switch span:hover{text-decoration:underline}
.login-error{color:var(--red);font-size:13px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px;display:none}

/* ─── MAIN LAYOUT ─── */
#app{display:none;padding-top:64px;margin-left:240px;transition:margin-left .3s}
#app.sidebar-hidden{margin-left:0}

/* ─── DASHBOARD ─── */
.dashboard{padding:32px 32px 0;max-width:1200px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.dash-greeting{font-size:22px;font-weight:800}
.dash-greeting span{background:linear-gradient(135deg,#f59e0b,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dash-date{font-size:13px;color:var(--text3)}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:all .3s}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,linear-gradient(90deg,#3b82f6,#8b5cf6))}
.dash-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.1)}
.dc-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.dc-value{font-size:30px;font-weight:900;line-height:1;margin-bottom:4px;background:var(--card-color,linear-gradient(135deg,#3b82f6,#8b5cf6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dc-sub{font-size:12px;color:var(--text3)}
.progress-bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;background:var(--card-color,linear-gradient(90deg,#3b82f6,#8b5cf6));transition:width .8s ease;width:0}

/* ─── LEFT SIDEBAR (固定左侧目录，参考学城样式) ─── */
#left-sidebar{
  position:fixed;top:64px;left:0;width:240px;height:calc(100vh - 64px);
  background:#0b1120;border-right:1px solid rgba(255,255,255,.07);
  z-index:100;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .3s ease;
}
#left-sidebar.hidden{transform:translateX(-100%)}

.lsb-head{
  padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.lsb-head-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.lsb-toggle-btn{
  background:none;border:none;color:var(--text3);font-size:15px;
  cursor:pointer;padding:3px 7px;border-radius:6px;transition:all .2s;line-height:1;
}
.lsb-toggle-btn:hover{color:var(--text);background:rgba(255,255,255,.08)}

.lsb-body{flex:1;overflow-y:auto;padding:8px 0 20px}
.lsb-body::-webkit-scrollbar{width:3px}
.lsb-body::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}

/* phase row */
.sdb-phase{margin-bottom:2px}
.sdb-phase-title{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--text);
  transition:background .2s;user-select:none;position:relative;
}
.sdb-phase-title::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;border-radius:0 2px 2px 0;transition:background .2s;
}
.sdb-phase-title:hover{background:rgba(255,255,255,.04)}
.sdb-phase-title.active-phase{color:#f59e0b;background:rgba(245,158,11,.06)}
.sdb-phase-title.active-phase::before{background:#f59e0b}
.sdb-phase-arrow{margin-left:auto;font-size:10px;transition:transform .25s;color:var(--text3);flex-shrink:0}
.sdb-phase-arrow.open{transform:rotate(90deg)}
.sdb-phase-content{overflow:hidden;transition:max-height .3s ease}
.sdb-phase-content.collapsed{max-height:0!important}

/* section title */
.sdb-section-title{
  padding:5px 14px 4px 22px;font-size:11px;font-weight:600;
  color:var(--text3);cursor:pointer;transition:color .2s;letter-spacing:.2px;
  margin-top:4px;
}
.sdb-section-title:hover{color:var(--text2)}

/* item row */
.sdb-item{
  padding:4px 12px 4px 30px;font-size:11.5px;color:var(--text3);
  cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:5px;
  line-height:1.45;border-left:2px solid transparent;
}
.sdb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sdb-item.done{color:var(--green)}
.sdb-item.active-item{color:var(--text);background:rgba(59,130,246,.07);border-left-color:#3b82f6}
.sdb-item-status{flex-shrink:0;font-size:10px;margin-top:2px}

/* ─── 左侧目录收起时的悬浮按钮 ─── */
#sidebar-float-btn{
  position:fixed;left:20px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:10px;
  background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.1);
  color:var(--text2);font-size:16px;cursor:pointer;z-index:300;
  display:none;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.4);
}
#sidebar-float-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);background:rgba(30,41,59,.95)}
#sidebar-float-btn.visible{display:flex}

/* ─── ROAD MAP ─── */
.roadmap{padding:0 32px 60px;max-width:1200px;margin:0 auto}
.phase{margin-bottom:48px}
.phase-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding:20px 24px;border-radius:var(--radius);border-left:4px solid var(--phase-color,#3b82f6);background:linear-gradient(90deg,rgba(59,130,246,.06),transparent)}
.phase-icon{font-size:36px;line-height:1}
.phase-info{flex:1}
.phase-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--phase-color,#3b82f6);margin-bottom:4px}
.phase-title{font-size:20px;font-weight:800;margin-bottom:4px}
.phase-desc{font-size:13px;color:var(--text2)}
.phase-prog{text-align:right;min-width:80px}
.phase-pct{font-size:24px;font-weight:900;color:var(--phase-color,#3b82f6)}
.phase-pct-label{font-size:11px;color:var(--text3)}

/* ─── SECTION BLOCK ─── */
.section-block{margin-bottom:32px}
.sb-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-left:2px}
.sb-title::before{content:'';width:3px;height:16px;border-radius:2px;background:var(--phase-color,#3b82f6);display:inline-block}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* ─── ITEM CARD (clickable) ─── */
.item-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:16px;display:flex;align-items:flex-start;gap:12px;
  transition:all .25s;position:relative;overflow:hidden;
  cursor:pointer;
}
.item-card:hover{border-color:rgba(245,158,11,.35);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.item-card.completed{border-color:rgba(16,185,129,.25);background:linear-gradient(135deg,rgba(16,185,129,.05),var(--card))}
.item-card.completed::after{content:'✓';position:absolute;top:10px;right:12px;width:22px;height:22px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;line-height:22px;text-align:center}
.item-card.highlighted{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.03)}
.item-card.flash-highlight{animation:cardFlash .7s ease}
@keyframes cardFlash{0%{border-color:rgba(245,158,11,.9);box-shadow:0 0 20px rgba(245,158,11,.5)}50%{border-color:rgba(245,158,11,.6);box-shadow:0 0 30px rgba(245,158,11,.3)}100%{border-color:var(--border);box-shadow:none}}
.item-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.4}
.item-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.item-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-link{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.2);transition:all .2s;cursor:pointer;text-decoration:none;display:inline-block}
.item-link:hover{background:rgba(59,130,246,.3)}
.item-link.orange{background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.2)}
.item-link.orange:hover{background:rgba(245,158,11,.25)}
.item-done-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(16,185,129,.25);background:rgba(16,185,129,.08);color:var(--green);transition:all .2s;white-space:nowrap}
.item-done-btn:hover{background:rgba(16,185,129,.2)}
.item-done-btn.done{background:rgba(16,185,129,.15);color:var(--green);border-color:rgba(16,185,129,.35)}
.item-tag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;background:rgba(99,102,241,.15);color:#818cf8}
.item-tag.video{background:rgba(236,72,153,.12);color:#f472b6}
.item-tag.tool{background:rgba(6,182,212,.12);color:#22d3ee}
.item-tag.project{background:rgba(245,158,11,.12);color:#f59e0b}
.item-tag.practice{background:rgba(139,92,246,.12);color:#a78bfa}

/* ─── QUIZ BLOCK ─── */
.quiz-block{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(59,130,246,.05));border:1px solid rgba(139,92,246,.2);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.quiz-block h4{font-size:14px;font-weight:700;color:#a78bfa;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.quiz-questions{display:flex;flex-direction:column;gap:10px}
.quiz-qa{border-radius:8px;background:rgba(255,255,255,.03);border-left:2px solid rgba(139,92,246,.3);overflow:hidden}
.quiz-q-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;cursor:pointer}
.quiz-q-text{font-size:13px;color:var(--text2);line-height:1.5;flex:1}
.quiz-ans-btn{flex-shrink:0;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(139,92,246,.3);background:rgba(139,92,246,.12);color:#a78bfa;white-space:nowrap;transition:all .2s;align-self:center}
.quiz-ans-btn:hover{background:rgba(139,92,246,.25)}
.quiz-ans-body{display:none;padding:0 12px 12px 12px;font-size:12px;color:#c4b5fd;line-height:1.7;border-top:1px solid rgba(139,92,246,.15)}
.quiz-ans-body.open{display:block}

/* ─── TOAST NOTIFICATION (顶部居中) ─── */
#toast-container{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:1200;pointer-events:none;
  display:flex;flex-direction:column;gap:8px;align-items:center;
  width:max-content;max-width:90vw;
}
.toast-item{
  pointer-events:auto;
  padding:12px 24px;
  border-radius:50px;
  background:linear-gradient(135deg,#f59e0b,#ec4899,#8b5cf6);
  color:white;font-size:14px;font-weight:700;
  box-shadow:0 6px 30px rgba(245,158,11,.5),0 2px 12px rgba(0,0,0,.3);
  line-height:1.5;letter-spacing:.3px;
  opacity:0;transform:translateY(-20px) scale(.9);
  transition:opacity .4s cubic-bezier(.34,1.56,.64,1),transform .4s cubic-bezier(.34,1.56,.64,1);
  cursor:pointer;white-space:nowrap;
}
.toast-item.show{opacity:1;transform:translateY(0) scale(1)}
.toast-item.hide{opacity:0;transform:translateY(-12px) scale(.95);transition:opacity .3s ease-in,transform .3s ease-in}

/* ─── PARTICLE CANVAS (就地局部效果，跟随卡片位置) ─── */
#particle-canvas{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:1100;pointer-events:none;
  opacity:1;
}

/* ─── PARTICLES BG ─── */
.bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-particle{position:absolute;border-radius:50%;animation:bgfloat linear infinite;opacity:.4}
@keyframes bgfloat{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}

/* ─── EMPTY / LOADING ─── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ─── PHASE CONNECTOR ─── */
.phase-connector{display:flex;justify-content:center;margin:-10px 0 20px;color:var(--text3);font-size:20px;opacity:.5}

/* ─── PROGRESS RING ─── */
.prog-ring-wrap{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.prog-ring{transform:rotate(-90deg)}
.prog-ring-bg{fill:none;stroke:rgba(255,255,255,.06)}
.prog-ring-bar{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s ease}

@media(max-width:900px){
  #left-sidebar{transform:translateX(-100%);z-index:400}
  #left-sidebar.mobile-open{transform:translateX(0)}
  #app{margin-left:0!important}
  #sidebar-float-btn{display:flex!important}
  #sidebar-mobile-overlay{display:block}
}
@media(max-width:768px){
  nav{padding:0 16px}.dashboard,.roadmap{padding-left:16px;padding-right:16px}
  .items-grid{grid-template-columns:1fr}
  .dash-cards{grid-template-columns:repeat(2,1fr)}
}

/* 移动端目录遮罩 */
#sidebar-mobile-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:390;opacity:0;pointer-events:none;transition:opacity .3s;
}
#sidebar-mobile-overlay.active{opacity:1;pointer-events:auto}
</style>
</head>
<body>

<!-- BG PARTICLES -->
<div class="bg-particles" id="bg-particles"></div>

<!-- FULLSCREEN PARTICLE CANVAS -->
<canvas id="particle-canvas"></canvas>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- ─── LOGIN SCREEN ─── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-panda">🦘</div>
    <div class="login-title">跟着团子学</div>
    <p class="login-sub">专为美团人打造的 AI 学习路线<br/>从入门小白到大神，无脑跟着学就对了！</p>
    <div class="login-form" id="login-form">
      <input class="login-input" id="login-username" type="text" placeholder="👤 起个昵称（随便起）" maxlength="20" autocomplete="off"/>
      <input class="login-input" id="login-password" type="password" placeholder="🔑 设置密码（随便设）" maxlength="30"/>
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">🚀 开始学习</button>
    </div>
    <div class="login-tip">账号数据保存在本设备浏览器 · 美团内网可访问所有学习链接</div>
    <div class="login-switch" id="login-switch">已有账号？<span onclick="toggleMode()">点击登录</span></div>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="app">
  <nav>
    <div class="nav-logo">
      <span class="nav-logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <ellipse cx="14" cy="17" rx="8" ry="9" fill="#f59e0b"/>
          <ellipse cx="14" cy="8" rx="6" ry="5.5" fill="#f59e0b"/>
          <ellipse cx="9.5" cy="3.5" rx="2" ry="3" fill="#f59e0b"/>
          <ellipse cx="18.5" cy="3.5" rx="2" ry="3" fill="#f59e0b"/>
          <ellipse cx="9.5" cy="3.5" rx="1" ry="1.8" fill="#fcd34d"/>
          <ellipse cx="18.5" cy="3.5" rx="1" ry="1.8" fill="#fcd34d"/>
          <circle cx="11.5" cy="7.5" r="1.2" fill="#1e293b"/>
          <circle cx="16.5" cy="7.5" r="1.2" fill="#1e293b"/>
          <circle cx="12" cy="7" r="0.4" fill="white"/>

//  STORAGE HELPERS
// ════════════════════════════════════════════════
const DB_KEY = 'tuanzi_users';
const SESSION_KEY = 'tuanzi_session';

function getUsers(){return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}
function saveUsers(u){localStorage.setItem(DB_KEY,JSON.stringify(u))}
function getSession(){return localStorage.getItem(SESSION_KEY)}
function saveSession(u){localStorage.setItem(SESSION_KEY,u)}
function clearSession(){localStorage.removeItem(SESSION_KEY)}

function getUserData(username){
  const users=getUsers();
  if(!users[username])users[username]={password:'',completed:{},clicked:{},joinDate:Date.now(),lastDate:Date.now()};
  return users[username];
}
function saveUserData(username,data){
  const users=getUsers();users[username]=data;saveUsers(users);
}

// ════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════
let isLoginMode=false;
let currentUser=null;

function toggleMode(){
  isLoginMode=!isLoginMode;
  document.getElementById('login-btn').textContent=isLoginMode?'🔐 登录':'🚀 开始学习';
  document.getElementById('login-switch').innerHTML=isLoginMode?'没有账号？<span onclick="toggleMode()">点击注册</span>':'已有账号？<span onclick="toggleMode()">点击登录</span>';
  document.getElementById('login-error').style.display='none';
}

function showError(msg){
  const el=document.getElementById('login-error');
  el.textContent=msg;el.style.display='block';
}

function doLogin(){
  const u=document.getElementById('login-username').value.trim();
  const p=document.getElementById('login-password').value;
  if(!u){showError('请输入昵称');return;}
  if(!p||p.length<2){showError('密码至少2位');return;}

  const users=getUsers();
  if(isLoginMode){
    if(!users[u]){showError('该昵称不存在，请先注册');return;}
    if(users[u].password!==btoa(p)){showError('密码错误');return;}
  } else {
    if(users[u]){showError('昵称已被使用，换一个或点击登录');return;}
    users[u]={password:btoa(p),completed:{},clicked:{},joinDate:Date.now(),lastDate:Date.now()};
    saveUsers(users);
  }
  saveSession(u);
  currentUser=u;
  enterApp();
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin()});

function doLogout(){
  clearSession();currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const udata=getUserData(currentUser);
  udata.lastDate=Date.now();

// ════════════════════════════════════════════════
//  RENDER ROADMAP
// ════════════════════════════════════════════════
function renderRoadmap(){
  const container=document.getElementById('roadmap-container');
  container.innerHTML='';
  PHASES.forEach((phase,pi)=>{
    const phaseEl=document.createElement('div');
    phaseEl.className='phase';
    phaseEl.id=phase.id;

    let totalItems=0,doneItems=0;
    const udata=getUserData(currentUser);
    phase.sections.forEach(sec=>{
      if(sec.items)sec.items.forEach(item=>{
        totalItems++;
        if(udata.completed[item.id])doneItems++;
      });
    });
    const pct=totalItems>0?Math.round(doneItems/totalItems*100):0;

    phaseEl.innerHTML=`
      <div class="phase-header" style="--phase-color:${phase.color}">
        <div class="phase-icon">${phase.icon}</div>
        <div class="phase-info">
          <div class="phase-num">${phase.num} · ${phase.time}</div>
          <div class="phase-title">${phase.title}</div>
          <div class="phase-desc">${phase.desc}</div>
        </div>
        <div class="phase-prog">
          <div class="phase-pct" style="color:${phase.color}">${pct}%</div>
          <div class="phase-pct-label">${doneItems}/${totalItems} 完成</div>
        </div>
      </div>
    `;

    phase.sections.forEach((sec,si)=>{
      const secEl=document.createElement('div');
      secEl.className='section-block';
      secEl.id=`sec-${phase.id}-${si}`;

      if(sec.type==='quiz'){
        const qasHtml=sec.qas.map((qa,qi)=>`
          <div class="quiz-qa" id="qa-${phase.id}-${si}-${qi}">
            <div class="quiz-q-row">
              <div class="quiz-q-text">${qa.q}</div>
              <button class="quiz-ans-btn" onclick="toggleAnswer(this,'ans-${phase.id}-${si}-${qi}')">查看答案</button>
            </div>
            <div class="quiz-ans-body" id="ans-${phase.id}-${si}-${qi}">${qa.a}</div>
          </div>
        `).join('');
        secEl.innerHTML=`
          <div class="sb-title" style="--phase-color:${phase.color}">${sec.title}</div>
          <div class="quiz-block">
            <h4>✏️ 练习题（完成以上内容后对照练习）</h4>
            <div class="quiz-questions">${qasHtml}</div>
          </div>
        `;
      } else {
        secEl.innerHTML=`<div class="sb-title" style="--phase-color:${phase.color}">${sec.title}</div>`;
        const gridEl=document.createElement('div');
        gridEl.className='items-grid';
        if(sec.items)sec.items.forEach(item=>{
          gridEl.appendChild(renderItem(item,phase.color));
        });
        secEl.appendChild(gridEl);
      }
      phaseEl.appendChild(secEl);
    });
    container.appendChild(phaseEl);

    if(pi<PHASES.length-1){
      const conn=document.createElement('div');
      conn.className='phase-connector';
      conn.innerHTML='⬇️';
      container.appendChild(conn);
    }
  });
}

function renderItem(item,phaseColor){
  const udata=getUserData(currentUser);
  const isDone=!!udata.completed[item.id];
  const isClicked=!!udata.clicked[item.id];

  const tagMap={doc:'文档',video:'视频',tool:'工具',project:'项目'};
  const tagClass=item.type==='video'?'video':item.type==='tool'?'tool':item.type==='project'?'project':'';

  const card=document.createElement('div');
  card.className=`item-card${isDone?' completed':''}`;
  card.id=`card-${item.id}`;

  // Make whole card clickable if there's a url
  if(item.url){
    card.addEventListener('click',function(e){
      // Don't navigate if clicking on a button or link
      if(e.target.closest('button')||e.target.closest('a'))return;
      trackClick(item.id);
      window.open(item.url,'_blank');
    });
  }

  // url2 button only (使用说明 button stays at bottom)
  let url2Html='';
  if(item.url2){
    url2Html=`<a class="item-link orange" href="${item.url2}" target="_blank" onclick="event.stopPropagation()">${item.url2Label||'使用说明'}</a>`;
  }

  const doneLabel=isDone?'✓ 已完成':'标记完成';

  card.innerHTML=`
    <div class="item-icon">${item.icon}</div>
    <div class="item-body">
      <div class="item-title">${item.title}${isClicked&&!isDone?' <span style="color:var(--text3);font-size:11px;font-weight:400">(已浏览)</span>':''}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-footer">
        ${url2Html}
        <button class="item-done-btn${isDone?' done':''}" onclick="event.stopPropagation();toggleDone('${item.id}',this)">${doneLabel}</button>
        <span class="item-tag ${tagClass}">${item.tag}</span>
      </div>
    </div>
  `;
  return card;
}

  const body=document.getElementById(ansId);
  if(!body)return;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);

//  INTERACTIONS
// ════════════════════════════════════════════════
function trackClick(itemId){
  const udata=getUserData(currentUser);
  if(!udata.clicked[itemId]){
    udata.clicked[itemId]=Date.now();
    saveUserData(currentUser,udata);
    updateDashboard();
    const card=document.getElementById(`card-${itemId}`);
    if(card){
      const titleEl=card.querySelector('.item-title');
      if(titleEl&&!udata.completed[itemId]){
        const base=titleEl.textContent.replace(/\s*\(已浏览\)/,'');
        titleEl.innerHTML=`${base} <span style="color:var(--text3);font-size:11px;font-weight:400">(已浏览)</span>`;
      }
    }
  }
}

function toggleDone(itemId,btn){
  const udata=getUserData(currentUser);
  if(udata.completed[itemId]){
    delete udata.completed[itemId];
    saveUserData(currentUser,udata);
    const card=document.getElementById(`card-${itemId}`);
    if(card){card.classList.remove('completed');btn.textContent='标记完成';btn.classList.remove('done');}
    updateDashboard();
    updatePhaseProgress();
    refreshSidebarItem(itemId,false);
  } else {
    udata.completed[itemId]=Date.now();
    if(!udata.clicked[itemId])udata.clicked[itemId]=Date.now();
    saveUserData(currentUser,udata);
    const card=document.getElementById(`card-${itemId}`);
    if(card){card.classList.add('completed');btn.textContent='✓ 已完成';btn.classList.add('done');}
    updateDashboard();
    updatePhaseProgress();
    refreshSidebarItem(itemId,true);
    celebrate(itemId);
  }
}

// ════════════════════════════════════════════════
//  CELEBRATE (就地粒子 + 顶部居中Toast)
// ════════════════════════════════════════════════
function celebrate(itemId){
  const msg=CELEBRATE_MSGS[Math.floor(Math.random()*CELEBRATE_MSGS.length)];
  // 获取卡片位置，在卡片中心就地播放粒子
  const card=document.getElementById(`card-${itemId}`);
  let cx, cy;
  if(card){
    const rect=card.getBoundingClientRect();
    cx=rect.left+rect.width/2;
    cy=rect.top+rect.height/2;
  } else {
    cx=window.innerWidth/2;
    cy=window.innerHeight/2;
  }
  launchParticles(cx, cy);
  showToast(`${msg.emoji} ${msg.title} ${msg.msg}`);
}

// ════════════════════════════════════════════════
//  CARD-LOCAL PARTICLE EXPLOSION（卡片就地爆发）
// ════════════════════════════════════════════════
const PARTICLE_COLORS=['#f59e0b','#ec4899','#8b5cf6','#3b82f6','#10b981','#06b6d4','#fbbf24','#f472b6','#34d399','#60a5fa'];
let particleAnimId=null;

function launchParticles(originX, originY){
  const canvas=document.getElementById('particle-canvas');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');

  // 默认以卡片中心为原点
  const cx = originX || window.innerWidth/2;
  const cy = originY || window.innerHeight/2;
  const particles=[];
  // 局部爆发：粒子数量适中，扩散半径控制在卡片附近
  const count=90;

  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    // 速度比全屏版稍小，集中在卡片周围
    const speed=Math.random()*8+2;
    const shape=['circle','rect','triangle','star'][Math.floor(Math.random()*4)];
    particles.push({
      x:cx, y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed - Math.random()*3,
      color:PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)],
      size:Math.random()*7+3,
      shape,
      rotation:Math.random()*360,
      rotSpeed:(Math.random()-0.5)*10,
      scale:1,
      opacity:1,
    });
  }

  // 额外：在卡片周围散落一些小星星（固定位置闪烁）
  const sparkles=[];
  for(let i=0;i<8;i++){
    sparkles.push({
      x:cx+(Math.random()-0.5)*200,
      y:cy+(Math.random()-0.5)*120,
      size:Math.random()*4+2,
      color:PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)],
      delay:Math.random()*0.4,
      opacity:0,
    });
  }

  const startTime=performance.now();
  const duration=1800;

  function draw(now){
    const elapsed=now-startTime;
    const progress=elapsed/duration;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 绘制主粒子
    let alive=false;
    particles.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.2; // 轻微重力
      p.vx*=0.98;
      p.rotation+=p.rotSpeed;
      p.opacity=Math.max(0,1-progress*1.3);
      p.scale=Math.max(0.1,1-progress*0.4);

      if(p.opacity>0){
        alive=true;
        ctx.save();
        ctx.globalAlpha=p.opacity;
        ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rotation*Math.PI/180);
        ctx.scale(p.scale,p.scale);
        const s=p.size;
        switch(p.shape){
          case 'circle':
            ctx.beginPath();ctx.arc(0,0,s/2,0,Math.PI*2);ctx.fill();break;
          case 'rect':
            ctx.fillRect(-s/2,-s/4,s,s/2);break;
          case 'triangle':
            ctx.beginPath();ctx.moveTo(0,-s/2);ctx.lineTo(s/2,s/2);ctx.lineTo(-s/2,s/2);ctx.closePath();ctx.fill();break;
          case 'star':
            drawStar(ctx,0,0,5,s/2,s/4);ctx.fill();break;
        }
        ctx.restore();
      }
    });

    // 绘制周围闪烁星点
    sparkles.forEach(sp=>{
      const spProgress=Math.max(0,(progress-sp.delay)/(1-sp.delay));
      sp.opacity=spProgress<0.3?spProgress/0.3:1-((spProgress-0.3)/0.7);
      if(sp.opacity>0){
        ctx.save();
        ctx.globalAlpha=sp.opacity*0.9;
        ctx.fillStyle=sp.color;
        ctx.shadowBlur=6;ctx.shadowColor=sp.color;
        drawStar(ctx,sp.x,sp.y,4,sp.size,sp.size*0.45);
        ctx.fill();
        ctx.restore();
      }
    });

    if(alive&&elapsed<duration+300){
      particleAnimId=requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(particleAnimId)cancelAnimationFrame(particleAnimId);
      particleAnimId=null;
    }
  }

  if(particleAnimId)cancelAnimationFrame(particleAnimId);
  particleAnimId=requestAnimationFrame(draw);
}

function drawStar(ctx,cx,cy,spikes,outerR,innerR){
  let rot=Math.PI/2*3;
  const step=Math.PI/spikes;
  ctx.beginPath();
  ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR);
    rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR);
    rot+=step;
  }
  ctx.lineTo(cx,cy-outerR);
  ctx.closePath();
}

// ════════════════════════════════════════════════
//  TOAST NOTIFICATION
// ════════════════════════════════════════════════
function showToast(text){
  const container=document.getElementById('toast-container');
  const toast=document.createElement('div');
  toast.className='toast-item';
  toast.textContent=text;
  toast.onclick=()=>dismissToast(toast);
  container.appendChild(toast);

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{toast.classList.add('show');});
  });

  setTimeout(()=>dismissToast(toast),3000);
}

function dismissToast(toast){
  if(!toast.parentNode)return;
  toast.classList.remove('show');
  toast.classList.add('hide');
  setTimeout(()=>{if(toast.parentNode)toast.parentNode.removeChild(toast);},350);
}

// ════════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════════
function buildSidebar(){
  const body=document.getElementById('sidebar-body');
  body.innerHTML='';
  const udata=getUserData(currentUser);

  PHASES.forEach((phase,pi)=>{
    const phaseDiv=document.createElement('div');
    phaseDiv.className='sdb-phase';

    const titleDiv=document.createElement('div');
    titleDiv.className='sdb-phase-title';
    titleDiv.id=`sdb-phase-title-${pi}`;
    titleDiv.innerHTML=`<span>${phase.icon} ${phase.num}</span><span class="sdb-phase-arrow open" id="sdb-arrow-${pi}">▶</span>`;
    titleDiv.onclick=()=>{
      if(window.innerWidth<=900)closeMobileSidebar();
      const el=document.getElementById(phase.id);
      if(el){el.scrollIntoView({behavior:'smooth',block:'start'});window.scrollBy(0,-80);}
    };

    const arrowSpan=titleDiv.querySelector('.sdb-phase-arrow');
    // toggle collapse
    const toggleBtn=document.createElement('span');
    arrowSpan.onclick=(e)=>{
      e.stopPropagation();
      const content=document.getElementById(`sdb-content-${pi}`);
      const isOpen=!content.classList.contains('collapsed');
      content.classList.toggle('collapsed',isOpen);
      arrowSpan.classList.toggle('open',!isOpen);
    };

    const contentDiv=document.createElement('div');
    contentDiv.className='sdb-phase-content';
    contentDiv.id=`sdb-content-${pi}`;
    // set max-height dynamically
    setTimeout(()=>{contentDiv.style.maxHeight=contentDiv.scrollHeight+'px';},50);

    phase.sections.forEach((sec,si)=>{
      if(sec.type==='quiz'||sec.type==='project'){return;}
      if(!sec.items)return;

      const secTitleDiv=document.createElement('div');
      secTitleDiv.className='sdb-section-title';
      secTitleDiv.textContent=sec.title;
      secTitleDiv.onclick=()=>{
        if(window.innerWidth<=900)closeMobileSidebar();
        const el=document.getElementById(`sec-${phase.id}-${si}`);
        if(el){el.scrollIntoView({behavior:'smooth',block:'start'});window.scrollBy(0,-80);}
      };
      contentDiv.appendChild(secTitleDiv);

      sec.items.forEach(item=>{
        const isDone=!!udata.completed[item.id];
        const itemDiv=document.createElement('div');
        itemDiv.className=`sdb-item${isDone?' done':''}`;
        itemDiv.id=`sdb-item-${item.id}`;
        itemDiv.innerHTML=`<span class="sdb-item-status">${isDone?'✓':'○'}</span><span>${item.title.replace(/^[✨🧩💥🚀]\s*/,'')}</span>`;
        itemDiv.onclick=()=>sidebarScrollToCard(item.id);
        contentDiv.appendChild(itemDiv);
      });
    });

    phaseDiv.appendChild(titleDiv);
    phaseDiv.appendChild(contentDiv);
    body.appendChild(phaseDiv);
  });
}

function sidebarScrollToCard(itemId){
  // 移动端才需要关闭
  if(window.innerWidth<=900)closeMobileSidebar();
  setTimeout(()=>{
    const card=document.getElementById(`card-${itemId}`);
    if(card){
      card.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{
        card.classList.add('flash-highlight');
        setTimeout(()=>card.classList.remove('flash-highlight'),800);
      },300);
    }
  },window.innerWidth<=900?300:50);
}

function refreshSidebarItem(itemId,isDone){
  const el=document.getElementById(`sdb-item-${itemId}`);
  if(!el)return;
  el.className=`sdb-item${isDone?' done':''}`;
  const statusEl=el.querySelector('.sdb-item-status');
  if(statusEl)statusEl.textContent=isDone?'✓':'○';
}

// ════════════════════════════════════════════════
//  SCROLL SPY — highlight active phase in sidebar
// ════════════════════════════════════════════════
function initScrollSpy(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const id=entry.target.id;
      const pi=PHASES.findIndex(p=>p.id===id);
      if(pi<0)return;
      const titleEl=document.getElementById(`sdb-phase-title-${pi}`);
      if(titleEl)titleEl.classList.toggle('active-phase',entry.isIntersecting);
    });
  },{threshold:0.1,rootMargin:'-64px 0px -60% 0px'});

  PHASES.forEach(phase=>{
    const el=document.getElementById(phase.id);
    if(el)observer.observe(el);
  });
}

// ════════════════════════════════════════════════
//  DASHBOARD UPDATE
// ════════════════════════════════════════════════
function updateDashboard(){
  const udata=getUserData(currentUser);

  let totalItems=0;
  PHASES.forEach(ph=>ph.sections.forEach(sec=>{if(sec.items)sec.items.forEach(()=>totalItems++);}));

  const doneCount=Object.keys(udata.completed).length;
  const clickCount=Object.keys(udata.clicked).length;
  const pct=totalItems>0?Math.round(doneCount/totalItems*100):0;

  const days=Math.max(1,Math.ceil((Date.now()-(udata.joinDate||Date.now()))/(1000*60*60*24)));

  let stageName='--',stageSub='开始第一阶段吧！';
  const p1Items=[],p2Items=[],p3Items=[];
  PHASES[0].sections.forEach(s=>{if(s.items)s.items.forEach(i=>p1Items.push(i.id))});
  PHASES[1].sections.forEach(s=>{if(s.items)s.items.forEach(i=>p2Items.push(i.id))});
  PHASES[2].sections.forEach(s=>{if(s.items)s.items.forEach(i=>p3Items.push(i.id))});
  const p1Done=p1Items.filter(i=>udata.completed[i]).length;
  const p2Done=p2Items.filter(i=>udata.completed[i]).length;
  const p3Done=p3Items.filter(i=>udata.completed[i]).length;

  if(p3Done>0){stageName='🚀 深度求索';stageSub=`第三阶段 ${Math.round(p3Done/p3Items.length*100)}%`;}
  else if(p2Done>0){stageName='🔥 熟练工';stageSub=`第二阶段 ${Math.round(p2Done/p2Items.length*100)}%`;}
  else if(p1Done>0){stageName='🌱 入门中';stageSub=`第一阶段 ${Math.round(p1Done/p1Items.length*100)}%`;}

  animateNum('dc-done',doneCount);
  animateNum('dc-read',clickCount);
  document.getElementById('dc-pct').textContent=pct+'%';
  document.getElementById('dc-stage').textContent=stageName;
  document.getElementById('dc-stage-sub').textContent=stageSub;
  document.getElementById('dc-days').textContent=days;

  const maxItems=Math.max(totalItems,1);
  setTimeout(()=>{
    document.getElementById('pb-done').style.width=(doneCount/maxItems*100)+'%';
    document.getElementById('pb-read').style.width=(clickCount/maxItems*100)+'%';
    document.getElementById('pb-pct').style.width=pct+'%';
    const circ=150.8;
    document.getElementById('prog-ring-bar').style.strokeDashoffset=circ*(1-pct/100);
    document.getElementById('ring-label').textContent=`${doneCount} / ${totalItems}`;
  },200);
}

let numTimers={};
function animateNum(id,target){
  const el=document.getElementById(id);
  const current=parseInt(el.textContent)||0;
  if(numTimers[id])clearInterval(numTimers[id]);
  const step=Math.max(1,Math.ceil(Math.abs(target-current)/20));
  let val=current;
  numTimers[id]=setInterval(()=>{
    if(val<target){val=Math.min(val+step,target);}
    else if(val>target){val=Math.max(val-step,target);}
    el.textContent=val;
    if(val===target)clearInterval(numTimers[id]);
  },30);
}

function updatePhaseProgress(){
  const udata=getUserData(currentUser);
  PHASES.forEach(phase=>{
    let totalItems=0,doneItems=0;
    phase.sections.forEach(sec=>{
      if(sec.items)sec.items.forEach(item=>{
        totalItems++;
        if(udata.completed[item.id])doneItems++;
      });
    });
    const pct=totalItems>0?Math.round(doneItems/totalItems*100):0;
    const phaseEl=document.getElementById(phase.id);
    if(phaseEl){
      const pctEl=phaseEl.querySelector('.phase-pct');
      const subEl=phaseEl.querySelector('.phase-pct-label');
      if(pctEl)pctEl.textContent=pct+'%';
      if(subEl)subEl.textContent=`${doneItems}/${totalItems} 完成`;
    }
  });
}

// ════════════════════════════════════════════════
//  BG PARTICLES
// ════════════════════════════════════════════════
function initBgParticles(){
  const container=document.getElementById('bg-particles');
  for(let i=0;i<15;i++){
    const p=document.createElement('div');
    p.className='bg-particle';
    const size=Math.random()*3+1;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${['#3b82f6','#8b5cf6','#f59e0b','#10b981'][Math.floor(Math.random()*4)]};animation-duration:${Math.random()*20+15}s;animation-delay:${Math.random()*15}s`;
    container.appendChild(p);
  }
}

if(savedUser&&getUsers()[savedUser]){
  currentUser=savedUser;
  document.getElementById('login-screen').style.display='none';
  enterApp();
}
